<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Intentional · Planning</title>
<style>
  :root {
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
  }
  body[data-theme="light"] {
    --bg:        #E2DCC8;
    --bg-app:    #F7F3EA;
    --bg-side:   #EDE5D2;
    --surface:   #FFFFFF;
    --surface-2: #F4EEDE;
    --line:      rgba(26,20,16,0.09);
    --line-2:    rgba(26,20,16,0.18);
    --line-3:    rgba(26,20,16,0.28);
    --text-1:    #1A1410;
    --text-2:    rgba(26,20,16,0.62);
    --text-3:    rgba(26,20,16,0.42);
    --text-4:    rgba(26,20,16,0.22);
    --primary-bg: #1A1410;
    --primary-fg: #F7F3EA;
    --primary-bg-h: #2c241d;
    --status-success: #1D9E75;
    --status-warning: #B97316;
    --status-error:   #B8323C;
  }
  body[data-theme="dark"] {
    --bg:        #0A0B0D;
    --bg-app:    #14161A;
    --bg-side:   #14161A;
    --surface:   #1A1D22;
    --surface-2: #22262C;
    --line:      rgba(255,255,255,0.08);
    --line-2:    rgba(255,255,255,0.16);
    --line-3:    rgba(255,255,255,0.26);
    --text-1:    #F4F5F6;
    --text-2:    rgba(255,255,255,0.62);
    --text-3:    rgba(255,255,255,0.42);
    --text-4:    rgba(255,255,255,0.22);
    --primary-bg: #F2EFE5;
    --primary-fg: #1A1410;
    --primary-bg-h: #FFFCF2;
    --status-success: #4EBE92;
    --status-warning: #D9A04A;
    --status-error:   #E26676;
  }
  :root {
    --hue-1: #D85A30;
    --hue-2: #1D9E75;
    --hue-3: #A855C7;
  }
  body[data-theme="light"] {
    --status-info: #355AB4;
  }
  body[data-theme="dark"] {
    --status-info: #9CB7EE;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text-1);
    font: 13px/1.5 var(--font); -webkit-font-smoothing: antialiased; }

  /* Mac window frame */
  .stage { padding: 28px 24px 60px; display: flex; justify-content: center; min-height: 100vh; }
  .win { width: min(1100px, 100%); border-radius: 14px; overflow: hidden;
    background: var(--bg-app); border: 0.5px solid var(--line);
    box-shadow: 0 30px 80px rgba(0,0,0,0.18), 0 4px 18px rgba(0,0,0,0.08); }
  body[data-theme="dark"] .win { box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 4px 18px rgba(0,0,0,0.30); }
  .titlebar { height: 36px; display: flex; align-items: center; padding: 0 14px;
    background: var(--bg-side); border-bottom: 0.5px solid var(--line);
    color: var(--text-2); font-size: 12px; gap: 10px; }
  .traffic { display: flex; gap: 7px; }
  .traffic span { width: 11px; height: 11px; border-radius: 999px; display: block; }
  .traffic .r { background: #ff5f57; }
  .traffic .y { background: #febc2e; }
  .traffic .g { background: #28c840; }
  .titlebar .app { font-weight: 500; color: var(--text-1); margin-left: 4px; }

  .win-body { display: grid; grid-template-columns: 200px 1fr; min-height: 760px; }
  .sidebar { background: var(--bg-side); border-right: 0.5px solid var(--line);
    padding: 22px 12px; }
  .brand { color: var(--text-1); font: 600 13.5px var(--font);
    margin: 4px 6px 22px; letter-spacing: -0.005em; }
  .nav-list { display: flex; flex-direction: column; gap: 1px; }
  .nav-list a { display: flex; align-items: center; gap: 10px; padding: 7px 10px;
    border-radius: 8px; color: var(--text-2); font: 500 12.5px var(--font);
    text-decoration: none; cursor: pointer; }
  .nav-list a:hover { color: var(--text-1); background: rgba(0,0,0,0.04); }
  body[data-theme="dark"] .nav-list a:hover { background: rgba(255,255,255,0.04); }
  .nav-list a.on { color: var(--text-1); background: rgba(0,0,0,0.06); font-weight: 600; }
  body[data-theme="dark"] .nav-list a.on { background: rgba(255,255,255,0.06); }
  .nav-list a svg { width: 13px; height: 13px; opacity: 0.7; }

  /* Page */
  .page { padding: 28px 32px 36px; display: flex; flex-direction: column; gap: 22px; }
  .pg-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .pg-head .eyebrow-row { font: 500 11px var(--font); letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
  .pg-head h1 { font: 600 22px/1.15 var(--font); letter-spacing: -0.01em; margin: 0;
    color: var(--text-1); }
  .head-actions { display: flex; gap: 6px; align-items: center; }
  .btn-ghost { background: transparent; border: 0.5px solid var(--line-2);
    color: var(--text-1); padding: 6px 11px; border-radius: var(--r-sm);
    font: 500 12.5px var(--font); cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px; transition: border-color 120ms ease; }
  .btn-ghost:hover { border-color: var(--line-3); }
  .btn-ghost svg { width: 12px; height: 12px; opacity: 0.7; }
  .btn-primary { background: var(--primary-bg); color: var(--primary-fg);
    border: 0.5px solid var(--primary-bg); padding: 7px 13px; border-radius: var(--r-sm);
    font: 600 12.5px var(--font); cursor: pointer; }
  .btn-primary:hover { background: var(--primary-bg-h); border-color: var(--primary-bg-h); }
  .btn-link { background: transparent; border: 0; color: var(--text-2);
    padding: 4px 6px; font: 500 12.5px var(--font); cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px; }
  .btn-link:hover { color: var(--text-1); }

  /* Section label — uppercase metadata only, NO subtitle */
  .eyebrow { font: 500 11px var(--font); letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; }

  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* ─── Monthly card — translucent tinted bg ───────────────────
     The colored fill carries the identity. Plain title in text-1,
     outcome in a slightly stronger hue tone to anchor the color. */
  .mcard { background: var(--m-bg, var(--surface));
    border: 0.5px solid var(--m-line, var(--line));
    border-radius: var(--r-lg); padding: 14px 16px;
    min-height: 92px; cursor: pointer;
    transition: filter 120ms ease, border-color 120ms ease, opacity 120ms ease;
    display: flex; flex-direction: column; gap: 6px; }
  .mcard:hover { filter: brightness(1.04); }
  .mcard.sel { box-shadow: 0 0 0 1.5px var(--hue, transparent) inset; }
  .mcard.dim { opacity: 0.35; filter: none; }
  .mcard .ttl { font: 600 14px/1.3 var(--font); color: var(--text-1); }
  .mcard .out { font: 12px/1.4 var(--font); color: var(--m-out, var(--text-3)); }

  /* ─── Weekly card — 4px left edge bar ──────────────────────── */
  .wcard { position: relative; background: var(--surface);
    border: 0.5px solid var(--line);
    border-radius: var(--r-lg); padding: 14px 16px 14px 18px;
    min-height: 92px; overflow: hidden;
    transition: border-color 120ms ease, opacity 120ms ease, transform 120ms ease;
    display: flex; flex-direction: column; gap: 4px;
    cursor: grab; user-select: none; }
  .wcard:hover { border-color: var(--line-2); }
  .wcard:active { cursor: grabbing; }
  .wcard.dragging { opacity: 0.4; }
  .wcard.dim { opacity: 0.35; }
  .wcard.unlinked { border-style: dashed; cursor: pointer; }
  .wcard .edge { position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--hue, transparent); }
  .wcard .ttl { font: 600 14px/1.3 var(--font); color: var(--text-1); }
  .wcard .out { font: 12px/1.4 var(--font); color: var(--text-3); }
  .wcard .foot { margin-top: auto; padding-top: 4px;
    font: 500 11.5px var(--font); color: var(--text-3);
    display: flex; align-items: center; gap: 6px; }
  /* Status — lowercase word in semantic color, NO capsule */
  .status { font-weight: 500; }
  .status.in-progress { color: var(--status-info); font-weight: 600; }
  .status.planned    { color: var(--text-3); }
  .status.done       { color: var(--status-success); }
  .status.slipped    { color: var(--status-error); }
  .status.dropped    { color: var(--text-4); text-decoration: line-through; }
  .status.unlinked   { color: var(--text-4); }

  /* ─── Today timeline strip ──────────────────────────────────
     Drop-target for weekly cards. Collapsible: header row stays
     visible, body collapses to just the summary line. */
  .tstrip { background: var(--surface); border: 0.5px solid var(--line);
    border-radius: var(--r-lg); overflow: hidden;
    transition: border-color 120ms ease, box-shadow 120ms ease; }
  .tstrip.drop-target { border-color: var(--line-3); }
  .tstrip-head { display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px; cursor: pointer; transition: background 120ms ease; }
  .tstrip-head:hover { background: var(--surface-2); }
  .tstrip-head .summary { display: flex; align-items: center; gap: 10px;
    color: var(--text-1); font: 500 13px var(--font); min-width: 0; }
  .tstrip-head .summary.empty { color: var(--text-3); }
  .tstrip-head .summary svg { width: 13px; height: 13px;
    color: var(--text-3); flex-shrink: 0; }
  .tstrip-head .right { display: flex; align-items: center; gap: 14px; }
  .tstrip-head .right .open-link { font: 500 12.5px var(--font);
    color: var(--status-info); text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
  .tstrip-head .right .open-link:hover { text-decoration: underline; }
  .tstrip-head .chev { width: 12px; height: 12px; color: var(--text-3);
    transition: transform 180ms ease; }
  .tstrip.collapsed .chev { transform: rotate(180deg); }
  .tstrip-body { padding: 26px 18px 18px;
    border-top: 0.5px solid var(--line); }
  .tstrip.collapsed .tstrip-body { display: none; }
  .tline { position: relative; height: 80px; user-select: none; }
  .tline .hour { position: absolute; top: 0; bottom: 0;
    border-left: 0.5px solid var(--line); }
  .tline .hour-lbl { position: absolute; top: -18px;
    font: 500 10px var(--font); color: var(--text-3);
    transform: translateX(-50%); }
  .tline .nowline { position: absolute; top: -8px; bottom: -8px; width: 1.5px;
    background: var(--status-warning); z-index: 4; pointer-events: none; }
  .tline .nowline::before { content: 'NOW'; position: absolute; top: -18px; left: 50%;
    transform: translateX(-50%); font: 600 9px var(--font);
    color: var(--status-warning); letter-spacing: 0.06em; white-space: nowrap; }
  .tline .block { position: absolute; top: 6px; bottom: 6px;
    border-radius: var(--r-md); padding: 6px 9px;
    background: var(--blk-bg); border-left: 2px solid var(--blk-fg);
    color: var(--blk-fg); cursor: grab; overflow: hidden;
    display: flex; flex-direction: column; justify-content: center;
    transition: box-shadow 80ms ease; }
  .tline .block:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.10); z-index: 3; }
  .tline .block.dragging { cursor: grabbing; box-shadow: 0 6px 18px rgba(0,0,0,0.18); z-index: 5; }
  .tline .block .ttl { font: 600 11px/1.2 var(--font);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tline .block .tm  { font: 500 10px var(--font); opacity: 0.85; margin-top: 1px;
    font-variant-numeric: tabular-nums; }
  .tline .block .resize { position: absolute; top: 0; bottom: 0; width: 6px;
    cursor: ew-resize; }
  .tline .block .resize.l { left: 0; }
  .tline .block .resize.r { right: 0; }
  .tline.drop-active { background: var(--surface-2); border-radius: var(--r-md); }

  /* ─── Past-week summary (read-only views) ─────────────────── */
  .past-summary { background: var(--surface); border: 0.5px solid var(--line);
    border-radius: var(--r-md); padding: 14px 18px;
    display: flex; align-items: center; gap: 28px; }
  .past-summary .stat { font: 500 12px var(--font); color: var(--text-3);
    display: flex; align-items: baseline; gap: 6px; }
  .past-summary .stat b { font: 600 18px var(--font); font-variant-numeric: tabular-nums;
    color: var(--text-1); }
  .past-summary .stat.success b { color: var(--status-success); }
  .past-summary .stat.error b { color: var(--status-error); }

  .readonly { color: var(--text-3); font: 500 12px var(--font);
    background: var(--surface-2); border: 0.5px solid var(--line);
    border-radius: var(--r-md); padding: 6px 12px; width: fit-content; }
  .readonly b { color: var(--text-2); font-weight: 600; }

  /* ─── History popover (week scrubber) ──────────────────────── */
  .history-wrap { position: relative; }
  .history-pop { position: absolute; top: calc(100% + 6px); right: 0; z-index: 40;
    background: var(--surface); border: 0.5px solid var(--line-2); border-radius: var(--r-md);
    padding: 6px; min-width: 220px; box-shadow: 0 14px 40px rgba(0,0,0,0.10);
    display: flex; flex-direction: column; gap: 1px; }
  body[data-theme="dark"] .history-pop { box-shadow: 0 14px 40px rgba(0,0,0,0.5); }
  .history-pop .hphd { font: 500 11px var(--font); letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--text-3); padding: 8px 10px 4px; }
  .history-pop button { background: transparent; border: 0; color: var(--text-1);
    padding: 8px 10px; border-radius: 6px; font: 500 12.5px var(--font);
    cursor: pointer; text-align: left; display: flex; align-items: center;
    justify-content: space-between; gap: 8px; }
  .history-pop button:hover { background: var(--surface-2); }
  .history-pop button.on { background: var(--surface-2); color: var(--text-1); font-weight: 600; }
  .history-pop button .hpmeta { font: 500 11.5px var(--font); color: var(--text-3); }
</style>
</head>
<body data-theme="light">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const HUE = { coral: 'var(--hue-1)', green: 'var(--hue-2)', pink: 'var(--hue-3)' };

const MONTHLY = [
  { id:'m1', title:'Ship Puck to 25 founding members', outcome:'25 paid orders by May 31', hue: HUE.coral },
  { id:'m2', title:'4hr deep work daily',              outcome:'20 weekdays averaged',     hue: HUE.green },
  { id:'m3', title:'Hit 10k followers on Puck IG',     outcome:'From 0 to 10k by May 31',  hue: HUE.pink  },
];

const WEEKLY = {
  may11: [
    { id:'wg1', title:'Record 3 demo videos', outcome:'Posted to IG by Sun', linksTo:'m1', status:'in-progress' },
    { id:'wg2', title:'Block phone 9-5 daily', outcome:'Zero IG scrolls 9-5', linksTo:'m2', status:'planned' },
    { id:'wg3', title:'Pitch 3 podcasts', outcome:'1 booked recording', linksTo:null, status:'planned' },
  ],
  may4: [
    { id:'pa1', title:'Set up WeWork desk', outcome:'Laptop stays at desk M-F', linksTo:'m2', status:'done' },
    { id:'pa2', title:'Block IG on phone after 9am', outcome:'Zero scrolls 9-5', linksTo:'m2', status:'slipped' },
    { id:'pa3', title:'DM 10 founders', outcome:'10 sent', linksTo:'m1', status:'done' },
  ],
  apr27: [
    { id:'pb1', title:'Ship v0.2 beta', outcome:'5 users on it', linksTo:'m1', status:'done' },
    { id:'pb2', title:'Write launch post', outcome:'Posted IG + Twitter', linksTo:'m3', status:'slipped' },
    { id:'pb3', title:'Reading hour daily', outcome:'5 sessions', linksTo:'m2', status:'done' },
  ],
  apr20: [
    { id:'pc1', title:'Customer interviews', outcome:'5 calls', linksTo:'m1', status:'done' },
    { id:'pc2', title:'Set up alarm system', outcome:'Works on first try', linksTo:'m2', status:'done' },
    { id:'pc3', title:'IG demo clip #1', outcome:'Posted Sunday', linksTo:'m3', status:'done' },
  ],
};

const WEEKS = [
  { id:'apr20', label:'Apr 20' },
  { id:'apr27', label:'Apr 27' },
  { id:'may4',  label:'May 4' },
  { id:'may11', label:'May 11', current:true },
];

const fmtStatus = (s) => s.replace('-', ' ');

const NavIcon = ({k}) => {
  const p = {
    today:  "M4 8 a4 4 0 1 0 8 0 a4 4 0 0 0 -8 0 z M8 5 v3 l2 1.5",
    cal:    "M3 4 H13 V13 H3 z M3 7 H13 M6 2 V5 M10 2 V5",
    target: "M8 2 a6 6 0 1 0 0 12 a6 6 0 0 0 0 -12 z M8 5 a3 3 0 1 0 0 6 a3 3 0 0 0 0 -6 z",
    shield: "M8 1 L13 3 V8 C13 11 11 13 8 14.5 C5 13 3 11 3 8 V3 z",
    gear:   "M8 1 v2 M8 13 v2 M1 8 h2 M13 8 h2 M8 5.5 a2.5 2.5 0 1 0 0 5 a2.5 2.5 0 0 0 0 -5 z",
  };
  return <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><path d={p[k]}/></svg>;
};
const SparkIcon = () => (
  <svg width="11" height="11" viewBox="0 0 16 16" fill="none"
    stroke="currentColor" strokeWidth="1.4" strokeLinecap="round">
    <path d="M8 1 L9.3 6 L14 7 L9.3 8 L8 13 L6.7 8 L2 7 L6.7 6 Z" />
  </svg>
);
const ClockIcon = () => (
  <svg width="12" height="12" viewBox="0 0 16 16" fill="none"
    stroke="currentColor" strokeWidth="1.4" strokeLinecap="round">
    <path d="M3 8 a5 5 0 1 0 1.5 -3.5" />
    <path d="M3 3 V5.5 H5.5" />
    <path d="M8 5 V8 L10 9.5" />
  </svg>
);
const ArrowRight = () => (
  <svg width="11" height="11" viewBox="0 0 16 16" fill="none"
    stroke="currentColor" strokeWidth="1.4" strokeLinecap="round">
    <path d="M3 8 H13 M9 4 L13 8 L9 12" />
  </svg>
);

// Helper — convert "var(--hue-X)" or hex to rgba with alpha
const HEX = { 'var(--hue-1)': '#D85A30', 'var(--hue-2)': '#1D9E75', 'var(--hue-3)': '#A855C7' };
const toRgba = (hueRef, a) => {
  const hex = HEX[hueRef] || hueRef;
  const r = parseInt(hex.slice(1,3), 16),
        g = parseInt(hex.slice(3,5), 16),
        b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
};

// ─── Cards ─────────────────────────────────────────────────────
function MonthlyCard({ g, sel, dim, onClick }) {
  return (
    <div className={`mcard${sel ? ' sel' : ''}${dim ? ' dim' : ''}`}
      onClick={onClick}
      style={{
        '--hue': g.hue,
        '--m-bg':   toRgba(g.hue, 0.14),
        '--m-line': toRgba(g.hue, 0.32),
        '--m-out':  toRgba(g.hue, 0.95),
      }}>
      <div className="ttl">{g.title}</div>
      <div className="out">{g.outcome}</div>
    </div>
  );
}

function WeeklyCard({ g, monthly, dim, onDragStart, onDragEnd, dragging }) {
  const parent = monthly.find(m => m.id === g.linksTo);
  return (
    <div className={`wcard${dim ? ' dim' : ''}${!parent ? ' unlinked' : ''}${dragging ? ' dragging' : ''}`}
      draggable={!!parent}
      onDragStart={parent ? (e) => onDragStart(g, parent, e) : undefined}
      onDragEnd={onDragEnd}
      style={{ '--hue': parent ? parent.hue : 'transparent' }}>
      {parent && <span className="edge" />}
      <div className="ttl">{g.title}</div>
      <div className="out">{g.outcome}</div>
      <div className="foot">
        <span className={`status ${g.status}`}>{fmtStatus(g.status)}</span>
        {!parent && <span className="status unlinked">· unlinked</span>}
      </div>
    </div>
  );
}

// ─── Today timeline strip ──────────────────────────────────────
const DAY_START = 8;
const DAY_END   = 20;
const NOW_HOUR  = 11.7;

const fmtHr = (h) => {
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  const period = hh >= 12 ? 'p' : 'a';
  const dh = ((hh + 11) % 12) + 1;
  return mm ? `${dh}:${String(mm).padStart(2,'0')}${period}` : `${dh}${period}`;
};
const fmtDur = (hrs) => {
  if (hrs <= 0) return '0';
  const h = Math.floor(hrs), m = Math.round((hrs - h) * 60);
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
};
const snap = (h) => Math.round(h * 4) / 4;
const hrPct = (h) => ((h - DAY_START) / (DAY_END - DAY_START)) * 100;

function TimelineBlock({ block, onChange }) {
  const elRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  React.useEffect(() => {
    const el = elRef.current;
    if (!el) return;
    let mode = null, startX = 0, startBlock = null, tlWidth = 0;
    const tl = el.parentElement;

    function down(e) {
      if (e.target.classList.contains('resize')) {
        mode = e.target.classList.contains('l') ? 'l' : 'r';
      } else {
        mode = 'move';
      }
      startX = e.clientX;
      startBlock = { start: block.start, end: block.end };
      tlWidth = tl.getBoundingClientRect().width;
      setDragging(true);
      e.preventDefault(); e.stopPropagation();
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
    }
    function move(e) {
      const dx = e.clientX - startX;
      const dhr = (dx / tlWidth) * (DAY_END - DAY_START);
      let next = { ...startBlock };
      if (mode === 'move') {
        const dur = startBlock.end - startBlock.start;
        let ns = snap(startBlock.start + dhr);
        ns = Math.max(DAY_START, Math.min(DAY_END - dur, ns));
        next = { start: ns, end: ns + dur };
      } else if (mode === 'l') {
        let ns = snap(startBlock.start + dhr);
        ns = Math.max(DAY_START, Math.min(block.end - 0.25, ns));
        next = { ...startBlock, start: ns, end: startBlock.end };
      } else if (mode === 'r') {
        let ne = snap(startBlock.end + dhr);
        ne = Math.max(block.start + 0.25, Math.min(DAY_END, ne));
        next = { ...startBlock, start: startBlock.start, end: ne };
      }
      onChange(next);
    }
    function up() {
      mode = null;
      setDragging(false);
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    }
    el.addEventListener('mousedown', down);
    return () => el.removeEventListener('mousedown', down);
  }, [block, onChange]);

  return (
    <div ref={elRef} className={`block${dragging ? ' dragging' : ''}`}
      style={{
        left: hrPct(block.start) + '%',
        width: (hrPct(block.end) - hrPct(block.start)) + '%',
        '--blk-bg': toRgba(block.hue, 0.18),
        '--blk-fg': HEX[block.hue] || block.hue,
      }}>
      <div className="resize l" />
      <div className="ttl">{block.title}</div>
      <div className="tm">{fmtHr(block.start)}–{fmtHr(block.end)} · {fmtDur(block.end - block.start)}</div>
      <div className="resize r" />
    </div>
  );
}

function TimelineStrip({ blocks, setBlocks, isDragOverFromCard, onDrop }) {
  const [open, setOpen] = React.useState(true);
  const [hover, setHover] = React.useState(false);
  const tlRef = React.useRef(null);

  const total = blocks.reduce((s, b) => s + (b.end - b.start), 0);
  const emptyText = 'No sessions planned · drag weekly goals here';
  const summaryText = blocks.length === 0
    ? emptyText
    : `${blocks.length} session${blocks.length > 1 ? 's' : ''} · ${fmtDur(total)} scheduled`;

  const handleDragOver = (e) => {
    if (!isDragOverFromCard) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    if (!open) setOpen(true);
    setHover(true);
  };
  const handleDragLeave = (e) => {
    if (!e.currentTarget.contains(e.relatedTarget)) setHover(false);
  };
  const handleDrop = (e) => {
    e.preventDefault();
    setHover(false);
    const tl = tlRef.current;
    if (!tl) return;
    const r = tl.getBoundingClientRect();
    const x = e.clientX - r.left;
    const hr = snap(DAY_START + (x / r.width) * (DAY_END - DAY_START));
    const start = Math.max(DAY_START, Math.min(DAY_END - 1, hr - 0.5));
    const end = Math.min(DAY_END, start + 1);
    onDrop({ start, end });
  };

  const hours = [];
  for (let h = DAY_START; h <= DAY_END; h += 2) hours.push(h);

  return (
    <div className={`tstrip${open ? '' : ' collapsed'}${hover ? ' drop-target' : ''}`}
      onDragOver={handleDragOver}
      onDragLeave={handleDragLeave}
      onDrop={handleDrop}>
      <div className="tstrip-head" onClick={() => setOpen(o => !o)}>
        <div className={`summary${blocks.length === 0 ? ' empty' : ''}`}>
          <ClockIcon />
          <span>{summaryText}</span>
        </div>
        <div className="right">
          <a className="open-link" onClick={(e) => e.stopPropagation()}>
            Open today <ArrowRight />
          </a>
          <svg className="chev" viewBox="0 0 16 16" fill="none"
            stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
            <path d="M4 10 L8 6 L12 10" />
          </svg>
        </div>
      </div>
      <div className="tstrip-body">
        <div ref={tlRef} className={`tline${hover ? ' drop-active' : ''}`}>
          {hours.map(h => (
            <React.Fragment key={h}>
              <div className="hour" style={{ left: hrPct(h) + '%' }} />
              <div className="hour-lbl" style={{ left: hrPct(h) + '%' }}>{fmtHr(h)}</div>
            </React.Fragment>
          ))}
          <div className="nowline" style={{ left: hrPct(NOW_HOUR) + '%' }} />
          {blocks.map((b) => (
            <TimelineBlock key={b.id} block={b}
              onChange={(patch) => setBlocks(prev => prev.map(x => x.id === b.id ? { ...x, ...patch } : x))} />
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────
function App() {
  const [weekId, setWeekId] = React.useState('may11');
  const [selectedMonthly, setSelectedMonthly] = React.useState(null);
  const [historyOpen, setHistoryOpen] = React.useState(false);

  // Today timeline state
  const [blocks, setBlocks] = React.useState([
    { id: 'b1', title: 'Record 3 demo videos', hue: 'var(--hue-1)', start: 9, end: 10.5 },
  ]);
  const [dragSource, setDragSource] = React.useState(null);
  const nextBlockId = React.useRef(2);

  const w = WEEKLY[weekId] || [];
  const currentWeek = WEEKS.find(x => x.id === weekId);
  const isCurrent = !!currentWeek?.current;
  const isPast = !isCurrent;

  const handleCardDragStart = (g, parent, e) => {
    setDragSource({ goalId: g.id, title: g.title, hue: parent.hue });
    e.dataTransfer.effectAllowed = 'copy';
    e.dataTransfer.setData('text/plain', g.id);
  };
  const handleCardDragEnd = () => setDragSource(null);
  const handleDropOnTimeline = ({ start, end }) => {
    if (!dragSource) return;
    setBlocks(prev => [...prev, {
      id: 'b' + (nextBlockId.current++),
      title: dragSource.title,
      hue: dragSource.hue,
      start, end,
    }]);
    setDragSource(null);
  };

  return (
    <div className="stage" onClick={() => setHistoryOpen(false)}>
      <div className="win">
        <div className="titlebar">
          <span className="traffic"><span className="r" /><span className="y" /><span className="g" /></span>
          <span className="app">Intentional</span>
        </div>

        <div className="win-body">
          <aside className="sidebar">
            <div className="brand">Intentional</div>
            <nav className="nav-list">
              <a><NavIcon k="today" />Today</a>
              <a className="on"><NavIcon k="cal" />Plan</a>
              <a><NavIcon k="target" />Focus modes</a>
              <a><NavIcon k="shield" />Accountability</a>
              <a><NavIcon k="gear" />Settings</a>
            </nav>
          </aside>

          <main>
            <div className="page">
              {/* Header */}
              <div className="pg-head">
                <div>
                  <div className="eyebrow-row">
                    {isCurrent
                      ? 'Wednesday \u00b7 Week 2 of May'
                      : `Viewing week of ${currentWeek?.label}`}
                  </div>
                  <h1>Your plan</h1>
                </div>
                <div className="head-actions">
                  <div className="history-wrap" onClick={e => e.stopPropagation()}>
                    <button className="btn-ghost" onClick={() => setHistoryOpen(v => !v)}>
                      <ClockIcon />History
                    </button>
                    {historyOpen && (
                      <div className="history-pop">
                        <div className="hphd">Jump to week</div>
                        {WEEKS.slice().reverse().map(wk => {
                          const w2 = WEEKLY[wk.id] || [];
                          const done = w2.filter(x => x.status === 'done').length;
                          return (
                            <button key={wk.id}
                              className={weekId === wk.id ? 'on' : ''}
                              onClick={() => { setWeekId(wk.id); setSelectedMonthly(null); setHistoryOpen(false); }}>
                              <span>{wk.label}{wk.current ? ' \u00b7 this week' : ''}</span>
                              <span className="hpmeta">
                                {wk.current ? 'in progress' : `${done}/${w2.length} done`}
                              </span>
                            </button>
                          );
                        })}
                      </div>
                    )}
                  </div>
                  {isCurrent && (
                    <button className="btn-ghost">
                      <SparkIcon />Help me plan
                    </button>
                  )}
                </div>
              </div>

              {isPast && (
                <div className="readonly"><b>Read-only</b> · past week</div>
              )}

              {/* Month row */}
              <div>
                <div className="eyebrow">May</div>
                <div className="row3">
                  {MONTHLY.map(g => (
                    <MonthlyCard key={g.id} g={g}
                      sel={selectedMonthly === g.id}
                      dim={selectedMonthly && selectedMonthly !== g.id}
                      onClick={() => setSelectedMonthly(selectedMonthly === g.id ? null : g.id)} />
                  ))}
                </div>
              </div>

              {/* Week row */}
              <div>
                <div className="eyebrow">This week</div>
                <div className="row3">
                  {w.map(g => (
                    <WeeklyCard key={g.id} g={g} monthly={MONTHLY}
                      dim={selectedMonthly && g.linksTo !== selectedMonthly}
                      onDragStart={handleCardDragStart}
                      onDragEnd={handleCardDragEnd}
                      dragging={dragSource?.goalId === g.id} />
                  ))}
                </div>
              </div>

              {/* Today timeline strip (current week only) — drag weekly cards onto it */}
              {isCurrent && (
                <div>
                  <div className="eyebrow">Today · Wednesday</div>
                  <TimelineStrip
                    blocks={blocks}
                    setBlocks={setBlocks}
                    isDragOverFromCard={!!dragSource}
                    onDrop={handleDropOnTimeline} />
                </div>
              )}

              {/* Past-week summary */}
              {isPast && (
                <div>
                  <div className="eyebrow">Last week summary</div>
                  <div className="past-summary">
                    <div className="stat success"><b>{w.filter(x => x.status === 'done').length}</b><span>done</span></div>
                    <div className="stat error"><b>{w.filter(x => x.status === 'slipped').length}</b><span>slipped</span></div>
                    <div className="stat"><b>{w.filter(x => x.status === 'dropped').length}</b><span>dropped</span></div>
                  </div>
                </div>
              )}
            </div>
          </main>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
